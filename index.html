<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gl1tch Events | Учет ивентов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #030303 100%);
            min-height: 100vh;
        }
        .blob {
            position: fixed;
            background: radial-gradient(circle, rgba(255, 30, 30, 0.2) 0%, rgba(180, 0, 0, 0.1) 50%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            pointer-events: none;
            z-index: 0;
            animation: floatBlob 25s ease-in-out infinite alternate;
        }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            50% { transform: translate(5%, 3%) scale(1.2); opacity: 0.6; }
            100% { transform: translate(-3%, 5%) scale(0.9); opacity: 0.3; }
        }
        .red-dot {
            position: fixed;
            background: radial-gradient(circle, #ff4444 0%, #ff0000 40%, #990000 80%);
            border-radius: 50%;
            box-shadow: 0 0 12px #ff0000, 0 0 25px rgba(255, 0, 0, 0.5);
            pointer-events: none;
            z-index: 1;
        }
        .card {
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 60, 60, 0.35);
            transition: all 0.3s ease;
            border-radius: 1rem;
            position: relative;
            z-index: 2;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #ff4444;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
        }
        .btn-red {
            background: linear-gradient(135deg, #cc0000 0%, #8b0000 100%);
            transition: all 0.3s ease;
        }
        .btn-red:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255, 0, 0, 0.5); }
        .btn-green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
        }
        .btn-green:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
        .tab-active {
            background: #cc0000;
            box-shadow: 0 2px 10px rgba(255, 0, 0, 0.3);
        }
        .tab-inactive {
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .tab-inactive:hover { background: rgba(255, 255, 255, 0.2); }
        .input-dark {
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 60, 60, 0.3);
            color: white;
            border-radius: 0.75rem;
            padding: 0.75rem;
            width: 100%;
        }
        .input-dark:focus {
            border-color: #cc0000;
            outline: none;
            box-shadow: 0 0 10px rgba(204, 0, 0, 0.3);
        }
        .modal {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
        }
        .modal-content {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid #cc0000;
            border-radius: 1rem;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeInUp { animation: fadeInUp 0.5s ease-out forwards; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .syncing {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #cc0000;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div id="blobsContainer"></div>
<div id="dotsContainer"></div>
<div id="syncStatus" class="syncing" style="display:none;">🔄 Синхронизация...</div>

<!-- ФОРМА ВХОДА -->
<div id="loginContainer" class="min-h-screen flex items-center justify-center p-4 relative z-10">
    <div class="modal-content p-8 w-96 animate-fadeInUp">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-red-600 to-red-900 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-table-list text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Gl1tch Events</h1>
            <p class="text-gray-400">Учет ивентов с автосинхронизацией</p>
        </div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Логин" class="input-dark mb-4" required>
            <input type="password" id="password" placeholder="Пароль" class="input-dark mb-6" required>
            <button type="submit" class="btn-red w-full py-3 rounded-xl font-semibold text-white">
                <i class="fas fa-sign-in-alt mr-2"></i> Войти
            </button>
        </form>
        <div class="text-center text-gray-500 text-sm mt-4">
            <i class="fas fa-info-circle"></i> Gl1tchFrost / kost@1975
        </div>
    </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div id="appContainer" style="display:none;">
    <div class="bg-black/50 backdrop-blur-md border-b border-red-900/50 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-red-600 to-red-900 rounded-xl flex items-center justify-center">
                        <i class="fas fa-table-list text-white text-xl"></i>
                    </div>
                    <h1 class="text-xl font-bold text-white">Gl1tch Events</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userName" class="text-white"></span>
                    <button id="logoutBtn" class="bg-red-600 px-4 py-2 rounded-xl text-sm text-white hover:bg-red-700">Выйти</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 mt-6">
        <div class="flex space-x-2 bg-black/30 rounded-xl p-1 w-fit">
            <button id="tabEvents" class="tab-active px-6 py-2 rounded-lg text-white">📋 Ивенты</button>
            <button id="tabStats" class="tab-inactive px-6 py-2 rounded-lg text-white">📊 Статистика</button>
        </div>
    </div>

    <div class="container mx-auto px-4 py-6">
        <div id="eventsTab">
            <button id="newEventBtn" class="btn-green px-6 py-3 rounded-xl font-semibold text-white mb-6">+ Новый ивент</button>
            <div id="eventsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="statsTab" style="display:none;">
            <div class="card p-6">
                <h3 class="text-white font-semibold mb-4">📈 Статистика</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="text-center">
                        <p class="text-gray-400">Всего ивентов</p>
                        <p class="text-4xl font-bold text-red-400" id="statTotal">0</p>
                    </div>
                    <div class="text-center">
                        <p class="text-gray-400">Последний ивент</p>
                        <p class="text-lg text-white" id="statLastEvent">—</p>
                    </div>
                </div>
                <canvas id="monthlyChart" height="200"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО СОЗДАНИЯ ИВЕНТА -->
<div id="eventModal" class="modal fixed inset-0 flex items-center justify-center z-50" style="display:none;">
    <div class="modal-content p-6 w-full max-w-md m-4">
        <h3 id="modalTitle" class="text-xl font-bold text-white mb-4">Новый ивент</h3>
        <form id="eventForm">
            <input type="hidden" id="eventId">
            <input type="text" id="eventTitle" placeholder="Название" class="input-dark mb-3" required>
            <textarea id="eventDescription" placeholder="Описание" rows="4" class="input-dark mb-3" required></textarea>
            <input type="text" id="eventAssistants" placeholder="Помощники" class="input-dark mb-3">
            <input type="text" id="eventActors" placeholder="Актёры" class="input-dark mb-3">
            <input type="text" id="eventBuilders" placeholder="Строители" class="input-dark mb-4">
            <div class="flex justify-end gap-3">
                <button type="button" id="closeModalBtn" class="px-4 py-2 bg-gray-600 rounded-xl text-white">Отмена</button>
                <button type="submit" class="btn-red px-4 py-2 rounded-xl text-white">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ============ НАСТРОЙКИ ============
    const GOOGLE_SHEETS_API = 'https://script.google.com/macros/s/AKfycbzrXzQPckGPg0CxYUi8r4z7w2WgVq6CyZznhhkc73Q51KyxxulRGGHraDzsmmWkCcQS/exec';
    const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1507778037197050057/wnyKFFsvAOKtdPFghv8mj2asH_xQOoFXsHJyemo53cj6jxWYRJccAZmVQuTdoiqiXDCb';
    
    let currentUser = null;
    let events = [];
    let monthlyChart = null;
    let autoSyncInterval = null;
    
    // ФИКСИРОВАННЫЙ ПОЛЬЗОВАТЕЛЬ
    const users = [
        { id: 1, username: 'Gl1tchFrost', password: 'kost@1975', role: 'admin' }
    ];
    
    // ============ GOOGLE SHEETS API ============
    async function syncToCloud() {
        if (!GOOGLE_SHEETS_API || events.length === 0) return;
        showSyncStatus(true);
        try {
            for (const event of events) {
                if (!event.synced) {
                    await fetch(GOOGLE_SHEETS_API, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(event)
                    });
                    event.synced = true;
                }
            }
            localStorage.setItem('events', JSON.stringify(events));
        } catch (error) { console.error('Sync error:', error); }
        showSyncStatus(false);
    }
    
    async function deleteFromCloud(eventId) {
        if (!GOOGLE_SHEETS_API) return;
        try {
            await fetch(`${GOOGLE_SHEETS_API}?id=${eventId}`, {
                method: 'DELETE',
                mode: 'no-cors'
            });
        } catch (error) { console.error('Delete error:', error); }
    }
    
    async function loadFromCloud() {
        if (!GOOGLE_SHEETS_API) return;
        showSyncStatus(true);
        try {
            const response = await fetch(GOOGLE_SHEETS_API);
            const cloudEvents = await response.json();
            if (cloudEvents.length > events.length) {
                events = cloudEvents;
                localStorage.setItem('events', JSON.stringify(events));
                renderEvents();
                renderStats();
            }
        } catch (error) { console.error('Load error:', error); }
        showSyncStatus(false);
    }
    
    // ============ DISCORD УВЕДОМЛЕНИЯ ============
    async function sendDiscordReport(eventData, username, isDelete = false) {
        const currentDate = new Date().toLocaleString('ru-RU');
        
        if (isDelete) {
            const embed = {
                title: '🗑️ ИВЕНТ УДАЛЕН - Gl1tch Events',
                description: `**${eventData.title}** был удалён из системы`,
                color: 0xff4444,
                fields: [
                    { name: '📝 УДАЛИЛ', value: username, inline: true },
                    { name: '📅 ДАТА УДАЛЕНИЯ', value: currentDate, inline: true }
                ],
                footer: { text: 'Gl1tch Events - Система учета' },
                timestamp: new Date().toISOString()
            };
            await fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'Gl1tch Events', embeds: [embed], content: '🗑️ **ИВЕНТ УДАЛЕН!**' })
            });
            return;
        }
        
        const embed = {
            title: '📋 НОВЫЙ ОТЧЕТ - Gl1tch Events',
            description: `**${eventData.title}**\n\n${eventData.description}`,
            color: 0xcc0000,
            fields: [
                { name: '👥 ПОМОЩНИКИ', value: eventData.assistants || 'Не указаны', inline: true },
                { name: '🎭 АКТЁРЫ', value: eventData.actors || 'Не указаны', inline: true },
                { name: '🏗️ СТРОИТЕЛИ', value: eventData.builders || 'Не указаны', inline: true },
                { name: '📝 ОТЧЁТ ОТ', value: username, inline: true },
                { name: '📅 ДАТА', value: currentDate, inline: true }
            ],
            footer: { text: 'Gl1tch Events - Автосинхронизация' },
            timestamp: new Date().toISOString()
        };
        await fetch(DISCORD_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: 'Gl1tch Events', embeds: [embed], content: '📋 **НОВЫЙ ОТЧЕТ!**' })
        });
    }
    
    // ============ ФУНКЦИИ АВТОРИЗАЦИИ ============
    function login(username, password) {
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            return true;
        }
        return false;
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem('currentUser');
        if (autoSyncInterval) clearInterval(autoSyncInterval);
    }
    
    function checkSession() {
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            return true;
        }
        return false;
    }
    
    // ============ УПРАВЛЕНИЕ ИВЕНТАМИ ============
    function loadEvents() {
        const saved = localStorage.getItem('events');
        events = saved ? JSON.parse(saved) : [];
        renderEvents();
        renderStats();
    }
    
    function saveEvents() {
        localStorage.setItem('events', JSON.stringify(events));
        renderEvents();
        renderStats();
        syncToCloud();
    }
    
    function createEvent(title, description, assistants, actors, builders) {
        const newEvent = {
            id: Date.now(),
            title, description,
            assistants: assistants || '', actors: actors || '', builders: builders || '',
            created_at: new Date().toISOString(),
            created_by: currentUser.username,
            synced: false
        };
        events.unshift(newEvent);
        saveEvents();
        return newEvent;
    }
    
    function updateEvent(id, title, description, assistants, actors, builders) {
        const event = events.find(e => e.id == id);
        if (event) {
            event.title = title; event.description = description;
            event.assistants = assistants || ''; event.actors = actors || ''; event.builders = builders || '';
            event.synced = false;
            saveEvents();
        }
    }
    
    async function deleteEvent(id) {
        const event = events.find(e => e.id == id);
        if (!event) return;
        
        events = events.filter(e => e.id != id);
        saveEvents();
        await deleteFromCloud(id);
        await sendDiscordReport(event, currentUser.username, true);
        showToast('🗑️ Ивент удалён');
    }
    
    // ============ ОТОБРАЖЕНИЕ ============
    function renderEvents() {
        const container = document.getElementById('eventsList');
        if (!container) return;
        
        if (events.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">Нет ивентов. Создайте первый!</div>';
            return;
        }
        
        container.innerHTML = events.map(e => `
            <div class="card p-6 animate-fadeInUp">
                <div class="flex justify-between items-start mb-3">
                    <h3 class="text-xl font-bold text-white flex-1">${escapeHtml(e.title)}</h3>
                    ${currentUser?.role === 'admin' ? `
                        <div class="flex gap-2">
                            <button onclick="editEvent(${e.id})" class="text-red-400 hover:text-red-300"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteEventHandler(${e.id})" class="text-red-600 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    ` : ''}
                </div>
                <p class="text-gray-300 mb-3">${escapeHtml((e.description || '').substring(0, 100))}${(e.description || '').length > 100 ? '...' : ''}</p>
                <div class="flex justify-between items-center text-sm text-gray-500">
                    <span><i class="far fa-calendar-alt mr-1"></i>${new Date(e.created_at).toLocaleDateString()}</span>
                    <button onclick="showDetail(${e.id})" class="text-red-400 hover:underline">Подробнее →</button>
                </div>
            </div>
        `).join('');
    }
    
    function renderStats() {
        document.getElementById('statTotal').innerText = events.length;
        const lastEvent = document.getElementById('statLastEvent');
        if (lastEvent && events.length > 0) lastEvent.innerText = events[0].title;
        
        const months = {};
        events.forEach(e => {
            const month = new Date(e.created_at).toLocaleString('ru-RU', { year: 'numeric', month: 'long' });
            months[month] = (months[month] || 0) + 1;
        });
        
        const labels = Object.keys(months).slice(0, 6);
        const data = labels.map(l => months[l]);
        
        if (monthlyChart) monthlyChart.destroy();
        const ctx = document.getElementById('monthlyChart');
        if (ctx) {
            monthlyChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: 'Ивенты', data, borderColor: '#ff4444', backgroundColor: 'rgba(255, 68, 68, 0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function showSyncStatus(show) {
        const status = document.getElementById('syncStatus');
        if (status) status.style.display = show ? 'block' : 'none';
    }
    
    // ============ ОБРАБОТЧИКИ ============
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        if (login(username, password)) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('userName').innerHTML = currentUser.username;
            loadEvents();
            startDots();
            loadFromCloud();
            if (autoSyncInterval) clearInterval(autoSyncInterval);
            autoSyncInterval = setInterval(() => loadFromCloud(), 30000);
        } else {
            alert('Неверный логин или пароль');
        }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        logout();
        location.reload();
    });
    
    document.getElementById('newEventBtn').onclick = () => {
        document.getElementById('eventId').value = '';
        document.getElementById('eventForm').reset();
        document.getElementById('modalTitle').innerText = 'Новый ивент';
        document.getElementById('eventModal').style.display = 'flex';
    };
    
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('eventModal').style.display = 'none';
    
    document.getElementById('eventForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('eventId').value;
        const title = document.getElementById('eventTitle').value;
        const description = document.getElementById('eventDescription').value;
        const assistants = document.getElementById('eventAssistants').value;
        const actors = document.getElementById('eventActors').value;
        const builders = document.getElementById('eventBuilders').value;
        
        if (id) {
            updateEvent(id, title, description, assistants, actors, builders);
            showToast('✅ Ивент обновлен');
        } else {
            const newEvent = createEvent(title, description, assistants, actors, builders);
            await sendDiscordReport({ title, description, assistants, actors, builders }, currentUser.username);
            showToast('✅ Ивент создан и отчет отправлен в Discord!');
        }
        document.getElementById('eventModal').style.display = 'none';
    });
    
    // Вкладки
    document.getElementById('tabEvents').onclick = () => {
        document.getElementById('eventsTab').style.display = 'block';
        document.getElementById('statsTab').style.display = 'none';
        document.getElementById('tabEvents').className = 'tab-active px-6 py-2 rounded-lg text-white';
        document.getElementById('tabStats').className = 'tab-inactive px-6 py-2 rounded-lg text-white';
    };
    
    document.getElementById('tabStats').onclick = () => {
        document.getElementById('eventsTab').style.display = 'none';
        document.getElementById('statsTab').style.display = 'block';
        document.getElementById('tabStats').className = 'tab-active px-6 py-2 rounded-lg text-white';
        document.getElementById('tabEvents').className = 'tab-inactive px-6 py-2 rounded-lg text-white';
        renderStats();
    };
    
    // Глобальные функции
    window.editEvent = (id) => {
        const event = events.find(e => e.id == id);
        document.getElementById('eventId').value = event.id;
        document.getElementById('eventTitle').value = event.title;
        document.getElementById('eventDescription').value = event.description;
        document.getElementById('eventAssistants').value = event.assistants || '';
        document.getElementById('eventActors').value = event.actors || '';
        document.getElementById('eventBuilders').value = event.builders || '';
        document.getElementById('modalTitle').innerText = 'Редактировать ивент';
        document.getElementById('eventModal').style.display = 'flex';
    };
    
    window.deleteEventHandler = async (id) => {
        if (confirm('🗑️ Удалить ивент?')) {
            await deleteEvent(id);
        }
    };
    
    window.showDetail = (id) => {
        const event = events.find(e => e.id == id);
        if (!event) return;
        
        const modal = document.createElement('div');
        modal.className = 'modal fixed inset-0 flex items-center justify-center z-50';
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        modal.innerHTML = `
            <div class="modal-content p-6 w-full max-w-2xl m-4">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-2xl font-bold text-white">${escapeHtml(event.title)}</h3>
                    <button onclick="this.closest('.modal').remove()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
                </div>
                <p class="text-gray-300 mb-6">${escapeHtml(event.description)}</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-red-900/30 p-4 rounded-xl"><b class="text-red-400">Помощники:</b><br>${escapeHtml(event.assistants) || 'Не указаны'}</div>
                    <div class="bg-red-900/30 p-4 rounded-xl"><b class="text-red-400">Актёры:</b><br>${escapeHtml(event.actors) || 'Не указаны'}</div>
                    <div class="bg-red-900/30 p-4 rounded-xl"><b class="text-red-400">Строители:</b><br>${escapeHtml(event.builders) || 'Не указаны'}</div>
                </div>
                <div class="mt-4 text-sm text-gray-500">Создан: ${new Date(event.created_at).toLocaleString()}</div>
                <div class="mt-2 text-sm text-gray-500">Создал: ${escapeHtml(event.created_by)}</div>
            </div>
        `;
        document.body.appendChild(modal);
    };
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ============ АНИМАЦИИ ============
    const blobsContainer = document.getElementById('blobsContainer');
    for (let i = 0; i < 12; i++) {
        const blob = document.createElement('div');
        blob.className = 'blob';
        const size = Math.random() * 450 + 150;
        blob.style.width = size + 'px';
        blob.style.height = size + 'px';
        blob.style.left = Math.random() * 100 + '%';
        blob.style.top = Math.random() * 100 + '%';
        blob.style.animationDuration = (Math.random() * 20 + 15) + 's';
        blob.style.animationDelay = (Math.random() * 6) + 's';
        blobsContainer.appendChild(blob);
    }
    
    let dotsInterval;
    function createDot() {
        const dot = document.createElement('div');
        dot.className = 'red-dot';
        const size = Math.random() * 16 + 2;
        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        dot.style.left = Math.random() * 100 + '%';
        dot.style.bottom = '-20px';
        dot.style.opacity = Math.random() * 0.7 + 0.2;
        document.getElementById('dotsContainer').appendChild(dot);
        const duration = Math.random() * 8 + 3;
        const xOffset = (Math.random() - 0.5) * 400;
        const rotate = Math.random() * 360;
        dot.style.transition = `transform ${duration}s linear, opacity ${duration}s linear`;
        setTimeout(() => {
            dot.style.transform = `translateY(-100vh) translateX(${xOffset}px) rotate(${rotate}deg)`;
            dot.style.opacity = '0';
        }, 10);
        setTimeout(() => dot.remove(), duration * 1000);
    }
    
    function startDots() {
        if (dotsInterval) clearInterval(dotsInterval);
        dotsInterval = setInterval(() => {
            if (document.getElementById('appContainer').style.display !== 'none') {
                const count = Math.floor(Math.random() * 25) + 12;
                for (let i = 0; i < count; i++) setTimeout(() => createDot(), Math.random() * 400);
            }
        }, 500);
    }
    
    // ============ ЗАПУСК ============
    if (checkSession()) {
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('userName').innerHTML = currentUser.username;
        loadEvents();
        startDots();
        loadFromCloud();
        autoSyncInterval = setInterval(() => loadFromCloud(), 30000);
    }
</script>

</body>
</html>
