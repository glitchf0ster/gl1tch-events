<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gl1tch Events | Учет ивентов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #030303 100%);
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 60, 60, 0.3);
            z-index: 50;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .sidebar::-webkit-scrollbar-thumb { background: #cc0000; border-radius: 4px; }
        .main-content { margin-left: 280px; position: relative; z-index: 10; }
        .nav-item { transition: all 0.2s ease; cursor: pointer; }
        .nav-item:hover { background: rgba(204, 0, 0, 0.2); transform: translateX(5px); }
        .nav-active { background: linear-gradient(90deg, rgba(204, 0, 0, 0.3), transparent); border-left: 3px solid #cc0000; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #cc0000; }
        .user-card { transition: all 0.2s ease; cursor: pointer; }
        .user-card:hover { background: rgba(255, 255, 255, 0.1); transform: translateX(5px); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeInUp { animation: fadeInUp 0.4s ease-out forwards; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .blob {
            position: fixed;
            background: radial-gradient(circle, rgba(255, 30, 30, 0.15) 0%, rgba(180, 0, 0, 0.08) 50%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            pointer-events: none;
            z-index: 0;
            animation: floatBlob 25s ease-in-out infinite alternate;
        }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            50% { transform: translate(5%, 3%) scale(1.2); opacity: 0.6; }
            100% { transform: translate(-3%, 5%) scale(0.9); opacity: 0.3; }
        }
        .red-dot {
            position: fixed;
            background: radial-gradient(circle, #ff4444 0%, #ff0000 40%, #990000 80%);
            border-radius: 50%;
            box-shadow: 0 0 12px #ff0000, 0 0 25px rgba(255, 0, 0, 0.5);
            pointer-events: none;
            z-index: 1;
        }
        .modal {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
        }
        .modal-content {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid #cc0000;
            border-radius: 1rem;
        }
        .input-dark {
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 60, 60, 0.3);
            color: white;
            border-radius: 0.75rem;
            padding: 0.75rem;
            width: 100%;
        }
        .input-dark:focus {
            border-color: #cc0000;
            outline: none;
            box-shadow: 0 0 10px rgba(204, 0, 0, 0.3);
        }
        .btn-red {
            background: linear-gradient(135deg, #cc0000 0%, #8b0000 100%);
            transition: all 0.3s ease;
        }
        .btn-red:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255, 0, 0, 0.5); }
        .btn-green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
        }
        .btn-green:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
        .btn-blue {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .btn-blue:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }
        .btn-yellow {
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
            transition: all 0.3s ease;
        }
        .btn-yellow:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(234, 179, 8, 0.4); }
        .status-pending { color: #eab308; }
        .status-approved { color: #10b981; }
        .status-completed { color: #3b82f6; }
    </style>
</head>
<body>

<div id="blobsContainer"></div>
<div id="dotsContainer"></div>

<!-- ФОРМА ВХОДА -->
<div id="loginContainer" class="min-h-screen flex items-center justify-center p-4 relative z-10">
    <div class="modal-content p-8 w-96 animate-fadeInUp">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-red-600 to-red-900 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-table-list text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Gl1tch Events</h1>
            <p class="text-gray-400">Учет ивентов</p>
        </div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Логин" class="input-dark mb-4" required>
            <input type="password" id="password" placeholder="Пароль" class="input-dark mb-6" required>
            <button type="submit" class="btn-red w-full py-3 rounded-xl font-semibold text-white">
                <i class="fas fa-sign-in-alt mr-2"></i> Войти
            </button>
        </form>
    </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div id="appContainer" style="display:none;">
    <div class="sidebar">
        <div class="p-6">
            <div class="flex items-center space-x-3 mb-8 pb-4 border-b border-red-900/50">
                <div class="w-10 h-10 bg-gradient-to-br from-red-600 to-red-900 rounded-xl flex items-center justify-center">
                    <i class="fas fa-table-list text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white">Gl1tch Events</h1>
                </div>
            </div>
            
            <div class="mb-6 p-3 bg-white/5 rounded-xl">
                <div class="flex items-center space-x-3">
                    <img id="userAvatar" class="avatar" src="https://ui-avatars.com/api/?background=cc0000&color=fff&bold=true&size=40&name=GF" alt="Avatar">
                    <div class="flex-1">
                        <p id="userName" class="text-white font-medium text-sm"></p>
                        <p id="userRole" class="text-xs text-gray-400"></p>
                    </div>
                </div>
            </div>
            
            <div class="space-y-1">
                <div class="nav-item px-4 py-3 rounded-lg flex items-center space-x-3" data-tab="events">
                    <i class="fas fa-calendar-alt w-5 text-red-400"></i>
                    <span class="text-gray-300">📋 Ивенты</span>
                </div>
                <div class="nav-item px-4 py-3 rounded-lg flex items-center space-x-3" data-tab="announce">
                    <i class="fas fa-bullhorn w-5 text-green-400"></i>
                    <span class="text-gray-300">📢 Создать анонс</span>
                </div>
                <div class="nav-item px-4 py-3 rounded-lg flex items-center space-x-3" data-tab="moderation" id="moderationTabBtn" style="display:none;">
                    <i class="fas fa-shield-alt w-5 text-yellow-400"></i>
                    <span class="text-gray-300">🛡️ На одобрение</span>
                </div>
                <div class="nav-item px-4 py-3 rounded-lg flex items-center space-x-3" data-tab="users">
                    <i class="fas fa-users w-5 text-purple-400"></i>
                    <span class="text-gray-300">👥 Пользователи</span>
                </div>
            </div>
            
            <div class="absolute bottom-6 left-0 right-0 px-4">
                <button id="logoutBtn" class="w-full py-2 bg-red-600/50 hover:bg-red-600 rounded-lg text-white text-sm transition flex items-center justify-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="container mx-auto px-6 py-8">
            <!-- Ивенты -->
            <div id="eventsTab" class="tab-content">
                <div id="eventsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <!-- Создать анонс -->
            <div id="announceTab" class="tab-content" style="display:none;">
                <div class="card p-6 bg-white/5 rounded-xl">
                    <h3 class="text-xl font-bold text-white mb-4">📢 Создать анонс ивента</h3>
                    <p class="text-gray-400 text-sm mb-4">Анонс будет отправлен администраторам на одобрение</p>
                    <form id="announceForm">
                        <input type="text" id="announceTitle" placeholder="📌 Название ивента" class="input-dark mb-3" required>
                        <textarea id="announceDescription" placeholder="📝 Описание ивента" rows="3" class="input-dark mb-3" required></textarea>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                            <div>
                                <label class="text-gray-400 text-sm block mb-1">👥 Помощники</label>
                                <input type="number" id="announceHelpers" placeholder="Сколько нужно" class="input-dark" min="0" value="0">
                            </div>
                            <div>
                                <label class="text-gray-400 text-sm block mb-1">🎭 Актёры</label>
                                <input type="number" id="announceActors" placeholder="Сколько нужно" class="input-dark" min="0" value="0">
                            </div>
                            <div>
                                <label class="text-gray-400 text-sm block mb-1">🏗️ Строители</label>
                                <input type="number" id="announceBuilders" placeholder="Сколько нужно" class="input-dark" min="0" value="0">
                            </div>
                        </div>
                        
                        <textarea id="announceExtra" placeholder="➕ Дополнительная информация (дата, время, требования и т.д.)" rows="2" class="input-dark mb-4"></textarea>
                        
                        <button type="submit" class="btn-blue w-full py-3 rounded-xl font-semibold text-white">
                            <i class="fas fa-paper-plane mr-2"></i> Отправить на одобрение
                        </button>
                    </form>
                </div>
            </div>

            <!-- Модерация (только для админов) -->
            <div id="moderationTab" class="tab-content" style="display:none;">
                <h3 class="text-xl font-bold text-white mb-4">🛡️ Анонсы на одобрение</h3>
                <div id="pendingAnnouncesList" class="space-y-4"></div>
                <hr class="border-red-900/50 my-6">
                <h3 class="text-xl font-bold text-white mb-4">⏳ Ивенты на проведение</h3>
                <div id="pendingEventsList" class="space-y-4"></div>
            </div>

            <!-- Пользователи -->
            <div id="usersTab" class="tab-content" style="display:none;">
                <h3 class="text-xl font-bold text-white mb-4">👥 Пользователи</h3>
                <div id="usersList" class="space-y-3"></div>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО ПРОВЕДЕНИЯ ИВЕНТА -->
<div id="completeEventModal" class="modal fixed inset-0 flex items-center justify-center z-50" style="display:none;">
    <div class="modal-content p-6 w-full max-w-md m-4">
        <h3 class="text-xl font-bold text-white mb-4">✅ Провести ивент</h3>
        <form id="completeEventForm">
            <input type="hidden" id="completeEventId">
            <input type="text" id="completeTitle" placeholder="Название" class="input-dark mb-3" required readonly>
            <textarea id="completeDescription" placeholder="Описание" rows="4" class="input-dark mb-3" required readonly></textarea>
            <input type="text" id="completeAssistants" placeholder="Помощники (кто был)" class="input-dark mb-3" required>
            <input type="text" id="completeActors" placeholder="Актёры (кто был)" class="input-dark mb-3" required>
            <input type="text" id="completeBuilders" placeholder="Строители (кто был)" class="input-dark mb-4" required>
            <div class="flex justify-end gap-3">
                <button type="button" id="closeCompleteModalBtn" class="px-4 py-2 bg-gray-600 rounded-xl text-white">Отмена</button>
                <button type="submit" class="btn-green px-4 py-2 rounded-xl text-white">Завершить</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ============ ПОЛЬЗОВАТЕЛИ ============
    const users = [
        { id: 1, username: 'Gl1tchFrost', password: 'kost@1975', role: 'admin', avatar: null },
        { id: 2, username: 'T1Ran', password: 'q4627hhn64', role: 'admin', avatar: null },
        { id: 3, username: 'Nezny', password: '2fcn92145hg', role: 'user', avatar: null },
        { id: 4, username: 'Pashock', password: 'j28hf39', role: 'user', avatar: null }
    ];
    
    const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1507778037197050057/wnyKFFsvAOKtdPFghv8mj2asH_xQOoFXsHJyemo53cj6jxWYRJccAZmVQuTdoiqiXDCb';
    const ANNOUNCE_WEBHOOK_URL = 'https://discord.com/api/webhooks/1507826979544633424/LwuAJ79T2NZoGyV08n45xwOUWfHB4ObLLZ98hLM-N2TOEaINRJV2OCSaIciQLJo1LCD4';
    
    let currentUser = null;
    let events = [];
    let pendingAnnounces = [];
    let pendingEvents = [];
    
    function loadData() {
        const savedEvents = localStorage.getItem('events');
        const savedPendingAnnounces = localStorage.getItem('pendingAnnounces');
        const savedPendingEvents = localStorage.getItem('pendingEvents');
        
        if (savedEvents) events = JSON.parse(savedEvents);
        if (savedPendingAnnounces) pendingAnnounces = JSON.parse(savedPendingAnnounces);
        if (savedPendingEvents) pendingEvents = JSON.parse(savedPendingEvents);
        
        renderEvents();
        renderUsersList();
        if (currentUser?.role === 'admin') {
            renderModeration();
        }
    }
    
    function saveAllData() {
        localStorage.setItem('events', JSON.stringify(events));
        localStorage.setItem('pendingAnnounces', JSON.stringify(pendingAnnounces));
        localStorage.setItem('pendingEvents', JSON.stringify(pendingEvents));
    }
    
    function renderUsersList() {
        const container = document.getElementById('usersList');
        if (!container) return;
        
        const roleLabels = {
            'admin': '<span class="text-red-400"><i class="fas fa-crown"></i> Администратор</span>',
            'user': '<span class="text-blue-400"><i class="fas fa-user"></i> Пользователь</span>'
        };
        
        container.innerHTML = users.map(u => `
            <div class="user-card flex items-center justify-between p-3 bg-white/5 rounded-xl">
                <div class="flex items-center space-x-3">
                    <img class="w-12 h-12 rounded-full object-cover border-2 border-red-500" src="${u.avatar || 'https://ui-avatars.com/api/?background=cc0000&color=fff&bold=true&size=40&name=' + (u.username || 'U').substring(0,2)}" alt="avatar">
                    <div>
                        <p class="text-white font-medium">${escapeHtml(u.username)}</p>
                        <p class="text-xs">${roleLabels[u.role] || u.role}</p>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    // Отправка уведомления ТОЛЬКО администратору (в канал "На одобрение")
    async function sendAnnouncementToAdmin(data, author) {
        const embed = {
            title: '📢 НОВЫЙ АНОНС НА ОДОБРЕНИЕ',
            description: `**${data.title}**\n\n${data.description}`,
            color: 0xeab308,
            fields: [
                { name: '👥 ТРЕБУЕТСЯ ПОМОЩНИКОВ', value: `${data.helpers} человек`, inline: true },
                { name: '🎭 ТРЕБУЕТСЯ АКТЁРОВ', value: `${data.actors} человек`, inline: true },
                { name: '🏗️ ТРЕБУЕТСЯ СТРОИТЕЛЕЙ', value: `${data.builders} человек`, inline: true },
                { name: '📝 АВТОР', value: author, inline: true }
            ],
            footer: { text: 'Требуется одобрение администратора' },
            timestamp: new Date().toISOString()
        };
        if (data.extra) embed.fields.push({ name: '📝 ДОПОЛНИТЕЛЬНО', value: data.extra, inline: false });
        
        try {
            await fetch(ANNOUNCE_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'Gl1tch Events', embeds: [embed], content: '@here **НОВЫЙ АНОНС НА ОДОБРЕНИЕ!**' })
            });
            return true;
        } catch (error) { return false; }
    }
    
    // Отправка в ОБЩИЙ АНОНС канал только после одобрения
    async function sendApprovedAnnouncement(data) {
        const embed = {
            title: '📢 АНОНС ИВЕНТА',
            description: `**${data.title}**\n\n${data.description}`,
            color: 0x10b981,
            fields: [
                { name: '👥 ТРЕБУЕТСЯ ПОМОЩНИКОВ', value: `${data.helpers} человек`, inline: true },
                { name: '🎭 ТРЕБУЕТСЯ АКТЁРОВ', value: `${data.actors} человек`, inline: true },
                { name: '🏗️ ТРЕБУЕТСЯ СТРОИТЕЛЕЙ', value: `${data.builders} человек`, inline: true }
            ],
            footer: { text: 'Ивент одобрен и добавлен в список на проведение' },
            timestamp: new Date().toISOString()
        };
        if (data.extra) embed.fields.push({ name: '📝 ДОПОЛНИТЕЛЬНО', value: data.extra, inline: false });
        
        try {
            await fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'Gl1tch Events', embeds: [embed], content: '@everyone **НОВЫЙ АНОНС ИВЕНТА!**' })
            });
            return true;
        } catch (error) { return false; }
    }
    
    async function sendRejectionAnnouncement(title, reason) {
        const embed = {
            title: '❌ АНОНС ОТКЛОНЕН',
            description: `**${title}**\n\nПричина: ${reason}`,
            color: 0xef4444,
            footer: { text: 'Анонс отклонён администратором' },
            timestamp: new Date().toISOString()
        };
        try {
            await fetch(ANNOUNCE_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'Gl1tch Events', embeds: [embed], content: '❌ **АНОНС ОТКЛОНЕН!**' })
            });
            return true;
        } catch (error) { return false; }
    }
    
    async function sendReport(eventData, username) {
        const currentDate = new Date().toLocaleString('ru-RU');
        const embed = {
            title: '📋 ОТЧЁТ О ПРОВЕДЕННОМ ИВЕНТЕ',
            description: `**${eventData.title}**\n\n${eventData.description}`,
            color: 0x3b82f6,
            fields: [
                { name: '👥 ПОМОЩНИКИ', value: eventData.assistants || 'Не указаны', inline: true },
                { name: '🎭 АКТЁРЫ', value: eventData.actors || 'Не указаны', inline: true },
                { name: '🏗️ СТРОИТЕЛИ', value: eventData.builders || 'Не указаны', inline: true },
                { name: '📝 ОТЧЁТ ОТ', value: username, inline: true },
                { name: '📅 ДАТА ПРОВЕДЕНИЯ', value: currentDate, inline: true }
            ],
            footer: { text: 'Gl1tch Events' },
            timestamp: new Date().toISOString()
        };
        try {
            await fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'Gl1tch Events', embeds: [embed], content: '📋 **НОВЫЙ ОТЧЁТ О ИВЕНТЕ!**' })
            });
            return true;
        } catch (error) { return false; }
    }
    
    async function createAnnounce(title, description, helpers, actors, builders, extra) {
        const newAnnounce = {
            id: Date.now(),
            title, description, helpers, actors, builders, extra,
            created_at: new Date().toISOString(),
            created_by: currentUser.username,
            status: 'pending'
        };
        pendingAnnounces.push(newAnnounce);
        saveAllData();
        // Отправляем уведомление ТОЛЬКО администратору
        await sendAnnouncementToAdmin({ title, description, helpers, actors, builders, extra }, currentUser.username);
        return newAnnounce;
    }
    
    async function approveAnnounce(id) {
        const announce = pendingAnnounces.find(a => a.id == id);
        if (announce) {
            pendingAnnounces = pendingAnnounces.filter(a => a.id != id);
            const newEvent = {
                id: Date.now(),
                title: announce.title,
                description: announce.description,
                assistants: '',
                actors: '',
                builders: '',
                helpers_needed: { helpers: announce.helpers, actors: announce.actors, builders: announce.builders },
                extra: announce.extra,
                created_at: announce.created_at,
                created_by: announce.created_by,
                approved_by: currentUser.username,
                status: 'approved'
            };
            pendingEvents.push(newEvent);
            saveAllData();
            // Только после одобрения отправляем в общий АНОНС канал
            await sendApprovedAnnouncement({
                title: announce.title,
                description: announce.description,
                helpers: announce.helpers,
                actors: announce.actors,
                builders: announce.builders,
                extra: announce.extra
            });
            renderModeration();
            return true;
        }
        return false;
    }
    
    async function rejectAnnounce(id, reason) {
        const announce = pendingAnnounces.find(a => a.id == id);
        if (announce) {
            pendingAnnounces = pendingAnnounces.filter(a => a.id != id);
            saveAllData();
            await sendRejectionAnnouncement(announce.title, reason);
            renderModeration();
            return true;
        }
        return false;
    }
    
    async function completeEvent(id, assistants, actors, builders) {
        const event = pendingEvents.find(e => e.id == id);
        if (event) {
            pendingEvents = pendingEvents.filter(e => e.id != id);
            const completedEvent = {
                ...event,
                assistants: assistants || '',
                actors: actors || '',
                builders: builders || '',
                completed_at: new Date().toISOString(),
                completed_by: currentUser.username,
                status: 'completed'
            };
            events.unshift(completedEvent);
            saveAllData();
            await sendReport(completedEvent, currentUser.username);
            renderEvents();
            renderModeration();
            return true;
        }
        return false;
    }
    
    function renderEvents() {
        const container = document.getElementById('eventsList');
        if (!container) return;
        const completedEvents = events.filter(e => e.status === 'completed');
        if (completedEvents.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">Нет проведённых ивентов</div>';
            return;
        }
        container.innerHTML = completedEvents.map(e => `
            <div class="card p-5 bg-white/5 rounded-xl animate-fadeInUp">
                <div class="flex justify-between items-start mb-3">
                    <div class="flex-1">
                        <h3 class="text-xl font-bold text-white">${escapeHtml(e.title)}</h3>
                        <div class="text-sm mt-1"><span class="status-completed"><i class="fas fa-check-circle"></i> ✅ Проведён</span></div>
                    </div>
                    ${currentUser?.role === 'admin' ? `
                        <button onclick="deleteEvent(${e.id})" class="text-red-500 hover:text-red-400"><i class="fas fa-trash"></i></button>
                    ` : ''}
                </div>
                <p class="text-gray-300 mb-3">${escapeHtml((e.description || '').substring(0, 100))}${(e.description || '').length > 100 ? '...' : ''}</p>
                <div class="flex justify-between items-center text-sm text-gray-500">
                    <span><i class="far fa-calendar-alt mr-1"></i>${new Date(e.completed_at).toLocaleDateString()}</span>
                    <button onclick="showDetail(${e.id})" class="text-red-400 hover:underline">Подробнее →</button>
                </div>
            </div>
        `).join('');
    }
    
    function renderModeration() {
        const pendingContainer = document.getElementById('pendingAnnouncesList');
        if (pendingContainer) {
            if (pendingAnnounces.length === 0) {
                pendingContainer.innerHTML = '<div class="text-center py-8 text-gray-400">Нет анонсов на одобрение</div>';
            } else {
                pendingContainer.innerHTML = pendingAnnounces.map(a => `
                    <div class="card p-4 bg-white/5 rounded-xl">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <h3 class="text-xl font-bold text-white">${escapeHtml(a.title)}</h3>
                                <p class="text-gray-400 text-sm mt-1">Автор: ${escapeHtml(a.created_by)} | ${new Date(a.created_at).toLocaleString()}</p>
                                <p class="text-gray-300 mt-2">${escapeHtml((a.description || '').substring(0, 150))}${(a.description || '').length > 150 ? '...' : ''}</p>
                                <div class="flex gap-4 mt-2 text-sm text-gray-400">
                                    <span>👥 Помощников: ${a.helpers}</span>
                                    <span>🎭 Актёров: ${a.actors}</span>
                                    <span>🏗️ Строителей: ${a.builders}</span>
                                </div>
                                ${a.extra ? `<p class="text-gray-500 text-sm mt-2">➕ ${escapeHtml(a.extra)}</p>` : ''}
                            </div>
                            <div class="flex gap-2 ml-4">
                                <button onclick="approve(${a.id})" class="btn-green px-4 py-2 rounded-lg text-white text-sm"><i class="fas fa-check"></i> Одобрить</button>
                                <button onclick="openRejectModal(${a.id}, '${escapeHtml(a.title)}')" class="btn-red px-4 py-2 rounded-lg text-white text-sm"><i class="fas fa-times"></i> Отклонить</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        const pendingEventsContainer = document.getElementById('pendingEventsList');
        if (pendingEventsContainer) {
            if (pendingEvents.length === 0) {
                pendingEventsContainer.innerHTML = '<div class="text-center py-8 text-gray-400">Нет ивентов на проведение</div>';
            } else {
                pendingEventsContainer.innerHTML = pendingEvents.map(e => `
                    <div class="card p-4 bg-white/5 rounded-xl">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <h3 class="text-xl font-bold text-white">${escapeHtml(e.title)}</h3>
                                <p class="text-gray-400 text-sm mt-1">Создал: ${escapeHtml(e.created_by)} | ${new Date(e.created_at).toLocaleString()}</p>
                                <p class="text-gray-300 mt-2">${escapeHtml((e.description || '').substring(0, 150))}${(e.description || '').length > 150 ? '...' : ''}</p>
                                <div class="flex gap-4 mt-2 text-sm text-gray-400">
                                    <span>👥 Нужно помощников: ${e.helpers_needed.helpers}</span>
                                    <span>🎭 Нужно актёров: ${e.helpers_needed.actors}</span>
                                    <span>🏗️ Нужно строителей: ${e.helpers_needed.builders}</span>
                                </div>
                            </div>
                            <div class="flex gap-2 ml-4">
                                <button onclick="openCompleteModal(${e.id})" class="btn-yellow px-4 py-2 rounded-lg text-white text-sm"><i class="fas fa-play"></i> Провести</button>
                                <button onclick="deletePendingEvent(${e.id})" class="text-red-500 hover:text-red-400"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }
    }
    
    function deleteEvent(id) {
        if (confirm('Удалить ивент?')) {
            events = events.filter(e => e.id != id);
            saveAllData();
            renderEvents();
            showToast('🗑️ Ивент удалён');
        }
    }
    
    function deletePendingEvent(id) {
        if (confirm('Удалить ивент из списка на проведение?')) {
            pendingEvents = pendingEvents.filter(e => e.id != id);
            saveAllData();
            renderModeration();
            showToast('🗑️ Ивент удалён');
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    window.approve = async (id) => {
        await approveAnnounce(id);
        showToast('✅ Анонс одобрен');
    };
    
    window.openRejectModal = (id, title) => {
        const reason = prompt('Укажите причину отклонения:', '');
        if (reason) {
            rejectAnnounce(id, reason);
            showToast('❌ Анонс отклонён');
        }
    };
    
    window.openCompleteModal = (id) => {
        const event = pendingEvents.find(e => e.id == id);
        document.getElementById('completeEventId').value = event.id;
        document.getElementById('completeTitle').value = event.title;
        document.getElementById('completeDescription').value = event.description;
        document.getElementById('completeAssistants').value = '';
        document.getElementById('completeActors').value = '';
        document.getElementById('completeBuilders').value = '';
        document.getElementById('completeEventModal').style.display = 'flex';
    };
    
    window.showDetail = (id) => {
        const event = events.find(e => e.id == id);
        const modal = document.createElement('div');
        modal.className = 'modal fixed inset-0 flex items-center justify-center z-50';
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        modal.innerHTML = `
            <div class="modal-content p-6 w-full max-w-2xl m-4">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-2xl font-bold text-white">${escapeHtml(event.title)}</h3>
                    <button onclick="this.closest('.modal').remove()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
                </div>
                <p class="text-gray-300 mb-6">${escapeHtml(event.description)}</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-red-900/30 p-4 rounded-xl"><b class="text-red-400">Помощники:</b><br>${escapeHtml(event.assistants) || 'Не указаны'}</div>
                    <div class="bg-red-900/30 p-4 rounded-xl"><b class="text-red-400">Актёры:</b><br>${escapeHtml(event.actors) || 'Не указаны'}</div>
                    <div class="bg-red-900/30 p-4 rounded-xl"><b class="text-red-400">Строители:</b><br>${escapeHtml(event.builders) || 'Не указаны'}</div>
                </div>
                <div class="mt-4 text-sm text-gray-500">Проведён: ${new Date(event.completed_at).toLocaleString()} | Отчёт: ${escapeHtml(event.completed_by)}</div>
            </div>
        `;
        document.body.appendChild(modal);
    };
    
    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const tab = item.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tab + 'Tab').style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            item.classList.add('nav-active');
        });
    });
    
    function login(username, password) {
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            document.getElementById('userName').innerHTML = currentUser.username;
            document.getElementById('userRole').innerHTML = currentUser.role === 'admin' ? '👑 Администратор' : '👤 Пользователь';
            
            if (currentUser.role === 'admin') {
                document.getElementById('moderationTabBtn').style.display = 'flex';
            } else {
                document.getElementById('moderationTabBtn').style.display = 'none';
            }
            return true;
        }
        return false;
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        if (login(username, password)) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            loadData();
            showToast(`Добро пожаловать, ${username}!`);
        } else {
            alert('Неверный логин или пароль');
        }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        currentUser = null;
        localStorage.removeItem('currentUser');
        location.reload();
    });
    
    document.getElementById('announceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('announceTitle').value;
        const description = document.getElementById('announceDescription').value;
        const helpers = document.getElementById('announceHelpers').value;
        const actors = document.getElementById('announceActors').value;
        const builders = document.getElementById('announceBuilders').value;
        const extra = document.getElementById('announceExtra').value;
        
        await createAnnounce(title, description, helpers, actors, builders, extra);
        showToast('✅ Анонс отправлен на одобрение администраторам!');
        document.getElementById('announceForm').reset();
    });
    
    document.getElementById('completeEventForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = parseInt(document.getElementById('completeEventId').value);
        const assistants = document.getElementById('completeAssistants').value;
        const actors = document.getElementById('completeActors').value;
        const builders = document.getElementById('completeBuilders').value;
        
        await completeEvent(id, assistants, actors, builders);
        showToast('✅ Ивент проведён, отчёт отправлен в Discord!');
        document.getElementById('completeEventModal').style.display = 'none';
    });
    
    document.getElementById('closeCompleteModalBtn').onclick = () => document.getElementById('completeEventModal').style.display = 'none';
    
    const blobsContainer = document.getElementById('blobsContainer');
    for (let i = 0; i < 12; i++) {
        const blob = document.createElement('div');
        blob.className = 'blob';
        const size = Math.random() * 450 + 150;
        blob.style.width = size + 'px';
        blob.style.height = size + 'px';
        blob.style.left = Math.random() * 100 + '%';
        blob.style.top = Math.random() * 100 + '%';
        blob.style.animationDuration = (Math.random() * 20 + 15) + 's';
        blob.style.animationDelay = (Math.random() * 6) + 's';
        blobsContainer.appendChild(blob);
    }
    
    let dotsInterval;
    function createDot() {
        const dot = document.createElement('div');
        dot.className = 'red-dot';
        const size = Math.random() * 16 + 2;
        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        dot.style.left = Math.random() * 100 + '%';
        dot.style.bottom = '-20px';
        dot.style.opacity = Math.random() * 0.7 + 0.2;
        document.getElementById('dotsContainer').appendChild(dot);
        const duration = Math.random() * 8 + 3;
        const xOffset = (Math.random() - 0.5) * 400;
        const rotate = Math.random() * 360;
        dot.style.transition = `transform ${duration}s linear, opacity ${duration}s linear`;
        setTimeout(() => {
            dot.style.transform = `translateY(-100vh) translateX(${xOffset}px) rotate(${rotate}deg)`;
            dot.style.opacity = '0';
        }, 10);
        setTimeout(() => dot.remove(), duration * 1000);
    }
    
    function startDots() {
        if (dotsInterval) clearInterval(dotsInterval);
        dotsInterval = setInterval(() => {
            if (document.getElementById('appContainer').style.display !== 'none') {
                const count = Math.floor(Math.random() * 25) + 12;
                for (let i = 0; i < count; i++) setTimeout(() => createDot(), Math.random() * 400);
            }
        }, 500);
    }
    startDots();
    
    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('userName').innerHTML = currentUser.username;
        document.getElementById('userRole').innerHTML = currentUser.role === 'admin' ? '👑 Администратор' : '👤 Пользователь';
        
        if (currentUser.role === 'admin') {
            document.getElementById('moderationTabBtn').style.display = 'flex';
        }
        loadData();
    }
</script>

</body>
</html>
